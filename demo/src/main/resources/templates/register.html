<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Game & Grill</title>

    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container">

        <img th:src="@{/img/logo.png}" alt="Game & Grill Logo" class="logo">

        <h1>Únete a Game & Grill</h1>

        <p class="subtitle">
            Crea tu cuenta y empieza a jugar
        </p>

        <form th:action="@{/registro}" method="post">

            <label>Nombre</label>
            <input type="text" name="usuario" placeholder="Tu nombre" required>
            
            <label>Email</label>
            <input type="email" name="email" placeholder="tu@email.com" required>
            
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••" required>
            
            <label>Edad</label>
            <input type="number" name="edad" placeholder="Edad">
            
            <label>Juegos favoritos</label>
            <input type="text" name="juegos" placeholder="Ej: D&D, Pokemon, Magic...">
            
            <button type="submit">
                Registrarse
            </button>

        </form>

        <a th:href="@{/}" class="link">
            ¿Ya tienes cuenta? Inicia sesión
        </a>

    </div>

</body>
</html>
