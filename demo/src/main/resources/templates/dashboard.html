<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game & Grill - Dashboard</title>
    <link rel="stylesheet" th:href="@{/CSS/dashboard.css}">
</head>

<body>

    <header class="navbar">
        <div class="logo-container">
            <div class="logo-placeholder">GG</div>
        </div>
        <nav class="nav-buttons">
            <button class="btn-nav btn-orange">Partidas</button>
            <button class="btn-nav btn-dark">Menú</button>
            <button class="btn-nav btn-dark">Perfil</button>
        </nav>
    </header>

    <main class="dashboard-container">

        <section class="section-header">
            <h2>Próximas partidas</h2>
            <p>Únete a una mesa y conoce jugadores</p>
        </section>

        <div class="games-grid">

            <div class="games-grid">

                <article class="game-card card-create-new">
                    <a th:href="@{/partidas/crear}">
                        <span class="create-icon">+</span>
                        <p>Crear nueva partida</p>
                    </a>
                </article>

            </div>

            <article class="game-card" th:each="partida : ${listaPartidas}">
                <div class="card-content">
                    <h3 th:text="${partida.titulo}">Título de la Partida</h3>
                    <p class="game-tag" th:text="${partida.juego}">Nombre del Juego</p>

                    <div class="game-details">
                        <div class="detail-item" th:text="'📅 ' + ${partida.fecha}">📅 Fecha</div>
                        <div class="detail-item" th:text="'📍 ' + ${partida.lugar}">📍 Lugar</div>
                        <div class="detail-item"
                            th:text="'👥 ' + ${partida.jugadoresApuntados} + '/' + ${partida.jugadoresMax} + ' jugadores'">
                            👥 Plazas</div>
                    </div>
                </div>
                <button class="btn-join">Unirme a la partida</button>
            </article>

        </div>
    </main>

</body>

</html>
