<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Game & Grill - Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <div th:replace="~{navbar :: navbar-styles}"></div>
</head>

<body>

    <div th:replace="~{navbar :: menu-navegacion}"></div>

    <main class="dashboard-container">
        <div class="section-header">
            <h2 th:text="#{dashboard.matches.available}">Available Matches</h2>
            <p th:text="#{dashboard.matches.description}">Join an active table or build your own custom event</p>
        </div>

        <div class="games-grid">
            <article class="game-card card-create-new">
                <a th:href="@{/partidas/crear}">
                    <span class="create-icon">+</span>
                    <p th:text="#{dashboard.create.match}">Create New Match</p>
                </a>
            </article>

            <div th:each="partida : ${listaPartidas}" class="game-card">
                <div class="card-content">
                    <h3 th:text="${partida.titulo}">Match Title</h3>
                    <p class="game-tag" th:text="${partida.juego}">Game Name</p>

                    <div class="game-details">
                        <p>
                            <strong th:text="#{dashboard.date}">Date:</strong>
                            <span th:text="${#temporals.format(partida.fecha, 'yyyy-MM-dd HH:mm')}">Date</span>
                        </p>
                        <p>
                            <strong th:text="#{dashboard.location}">Location:</strong>
                            <span th:text="${partida.lugar}">Location</span>
                        </p>
                        <p>
                            <strong th:text="#{dashboard.players}">Players:</strong>
                            <span th:text="${partida.jugadoresApuntados}">0</span> /
                            <span th:text="${partida.jugadoresMax}">10</span>
                        </p>
                    </div>
                </div>
                <a href="#" class="btn-join" style="text-decoration: none;" th:text="#{dashboard.chat}">Match Chat</a>
            </div>
        </div>
    </main>

</body>

</html>
