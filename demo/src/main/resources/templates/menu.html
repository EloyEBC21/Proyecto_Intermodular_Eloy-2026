<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú</title>
    <div th:replace="~{navbar :: navbar-styles}"></div>
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <th:block th:replace="~{fragments/head :: favicon}"></th:block>
</head>

<body>
    <div th:replace="~{navbar :: menu-navegacion}"></div>

    <main class="menu-main-container">

        <div class="product-list">
            <h1 th:text="#{menu.title}">Menú</h1>

            <div th:if="${menu != null}">
                <div th:each="entry : ${menu}">
                    <h3 th:text="${entry.key}" style="color: #ff6b35; margin-top: 25px;">Categoría</h3>

                    <div th:each="producto : ${entry.value}" th:if="${producto != null}" class="product-card">
                        <div>
                            <strong th:text="${producto.nombre}">Nombre</strong><br>
                            <small th:text="${producto.descripcion ?: ''}">Descripción</small><br>
                            <span class="product-price"
                                th:text="${producto.precio != null} ? ${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')} + '€' : '0.00€'">
                                Precio
                            </span>
                        </div>

                        <form th:action="@{/menu/agregar}" method="post">
                            <input type="hidden" name="nombre" th:value="${producto.nombre}" />
                            <input type="hidden" name="precio" th:value="${producto.precio}" />
                            <button type="submit" class="add-button">Añadir</button>
                        </form>
                    </div>
                </div>
            </div>

            <p th:if="${menu == null or menu.isEmpty()}">No hay productos disponibles.</p>
        </div>

        <div class="cart-sidebar">
            <h3 th:text="#{menu.cart.title}">🛒 Tu pedido</h3>

            <div th:if="${session.carrito != null and not #lists.isEmpty(session.carrito)}">
                <div th:each="item, itemStat : ${session.carrito}">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">

                        <p style="margin: 0;"
                            th:text="${item.nombre} + ' - ' + ${#numbers.formatDecimal(item.precio, 1, 'COMMA', 2, 'POINT')} + '€'">
                        </p>

                        <form th:action="@{/menu/eliminar}" method="post" style="margin: 0;">
                            <input type="hidden" name="indice" th:value="${itemStat.index}" />
                            <button type="submit"
                                style="background: red; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px;">X</button>
                        </form>
                    </div>
                </div>

                <hr>
                <div class="cart-total">
                    <p>
                        <strong>Total: </strong>
                        <span
                            th:text="${#numbers.formatDecimal(totalCarrito, 1, 'COMMA', 2, 'POINT')} + '€'">0,00€</span>
                    </p>
                </div>

                <a th:href="@{/pago}" class="add-button" th:text="#{menu.button.pay}">Ir a pagar</a>
            </div>

            <p th:if="${session.carrito == null or #lists.isEmpty(session.carrito)}" th:text="#{menu.cart.empty}">Tu
                carrito está vacío</p>
        </div>

    </main>
</body>

</html>
