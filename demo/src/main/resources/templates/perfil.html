<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link class="style-link" rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link th:replace="~{navbar :: navbar-styles}">
</head>

<body>

    <div th:replace="~{navbar :: menu-navegacion}"></div>

    <main class="dashboard-container" style="display: flex; justify-content: center;">
        <div class="profile-card">

            <div class="game-details">
                <div class="profile-avatar" th:text="${#strings.substring(usuarioLogueado.usuario, 0, 1)}">U</div>

                <h2 style="margin: 0 0 5px 0; color: #111111;" th:text="${usuarioLogueado.usuario}">Username</h2>
                <p style="color: #ff6b35; font-weight: bold; margin: 0 0 20px 0;" th:text="${usuarioLogueado.email}">
                    user@mail.com</p>
                <p>
                    <strong th:text="#{profile.age}"></strong>
                    <span th:text="${usuarioLogueado.edad} + ' ' + #{profile.years}"></span>
                </p>
                <p>
                    <strong th:text="#{profile.rank}"></strong>
                    <span style="color: #4CAF50; font-weight: bold;" th:text="#{profile.rank.value}"></span>
                </p>
            </div>

            <p>
                <strong th:text="#{profile.games}"></strong>
                <span
                    th:text="${usuarioLogueado.juegos != null ? usuarioLogueado.juegos : #messages.msg('profile.no.games')}"></span>
            </p>
    </main>

</body>

</html>
