<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <th:block th:fragment="favicon">
        <link rel="icon" type="image/png" th:href="@{/icons/favicon-96x96.png}" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" th:href="@{/icons/favicon.svg}" />
        <link rel="shortcut icon" th:href="@{/icons/favicon.ico}" />
        <link rel="apple-touch-icon" sizes="180x180" th:href="@{/icons/apple-touch-icon.png}" />
        <link rel="manifest" th:href="@{/icons/site.webmanifest}" />
    </th:block>
</body>

</html>
