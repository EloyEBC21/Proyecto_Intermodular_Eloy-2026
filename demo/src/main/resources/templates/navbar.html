<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <style th:fragment="navbar-styles">
        body {
            padding-top: 80px !important;
            margin: 0;
        }

        nav.main-navbar {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 60px !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center !important;
            background-color: #1e1e1e !important;
            padding: 0 20px !important;
            border-bottom: 2px solid #ff6b00 !important;
            z-index: 9999 !important;
            font-family: 'Roboto', sans-serif !important;
        }

        nav.main-navbar .nav-brand {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            gap: 10px !important;
            color: white !important;
            font-size: 20px !important;
            font-weight: bold !important;
            text-decoration: none !important;
            width: auto !important;
        }

        nav.main-navbar .nav-links {
            display: flex !important;
            flex-direction: row !important;
            gap: 10px !important;
            align-items: center !important;
            width: auto !important;
        }

        nav.main-navbar .nav-links a {
            display: inline-block !important;
            background-color: #2c2c2c !important;
            color: white !important;
            padding: 8px 16px !important;
            text-decoration: none !important;
            border: 1px solid #444 !important;
            border-radius: 4px !important;
            font-size: 14px !important;
            width: auto !important;
            margin: 0 !important;
        }

        nav.main-navbar .nav-links a:hover,
        nav.main-navbar .nav-links a.active {
            background-color: #ff6b00 !important;
            border-color: #ff6b00 !important;
            color: white !important;
        }

        nav.main-navbar .lang-dropdown {
            position: relative !important;
            display: inline-block !important;
            margin-right: 5px;
            padding: 8px 12px !important;
        }

        nav.main-navbar .dropbtn {
            background-color: #2c2c2c !important;
            color: white !important;
            padding: 8px 16px !important;
            font-size: 14px !important;
            border: 1px solid #444 !important;
            border-radius: 4px !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            width: auto !important;
        }

        nav.main-navbar .lang-dropdown a {
            margin-right: 5px;
            padding: 8px 12px !important;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <nav th:fragment="menu-navegacion" class="main-navbar">
        <a th:href="@{/dashboard}" class="nav-brand">
            <span>Game & Grill</span>
        </a>

        <div class="nav-links">
            <a th:href="@{/dashboard}" th:text="#{navbar.dashboard}">Dashboard</a>
            <a th:href="@{/menu}" th:text="#{navbar.menu}">Menu</a>
            <a th:href="@{/usuarios}" th:text="#{navbar.explore}">Explore Players</a>
            <a th:href="@{/perfil}" th:text="#{navbar.profile}">My Profile</a>

            <div class="lang-dropdown">
                <a th:href="@{${currentUri}(lang='es')}">ES</a>
                <a th:href="@{${currentUri}(lang='en')}">EN</a>
                <a th:href="@{${currentUri}(lang='va')}">VA</a>
            </div>
        </div>
    </nav>

</body>

</html>
