<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{form.page.title}">Crear Partida - Game & Grill</title>
    <link rel="stylesheet" th:href="@{/css/formPartida.css}">
    <link rel="stylesheet" th:href="@{/css/navbar-styles.css}">
    <th:block th:replace="~{fragments/head :: favicon}"></th:block>
</head>

<body class="form-body">

    <div th:replace="~{navbar :: menu-navegacion}"></div>

    <div class="form-container">
        <h2 th:text="#{form.title}">Crear Nueva Partida</h2>
        <p th:text="#{form.subtitle}" style="color: #666; margin-bottom: 25px; font-size: 0.95rem;">Organiza una mesa
        </p>

        <form th:action="@{/partidas/crear}" method="post">
            <div class="form-group">
                <label th:text="#{form.label.name}">Nombre</label>
                <input type="text" id="titulo" name="titulo" th:placeholder="#{form.placeholder.name}" required>
            </div>
            <div class="form-group">
                <label th:text="#{form.label.game}">Juego</label>
                <input type="text" id="juego" name="juego" th:placeholder="#{form.placeholder.game}" required>
            </div>
            <div class="form-group">
                <label th:text="#{form.label.maxPlayers}">Jugadores</label>
                <input type="number" id="jugadoresMax" name="jugadoresMax" min="1"
                    th:placeholder="#{form.placeholder.players}" required>
            </div>
            <div class="form-group">
                <label th:text="#{form.label.date}">Fecha</label>
                <input type="datetime-local" id="fecha" name="fecha" required>
            </div>
            <div class="form-group">
                <label th:text="#{form.label.location}">Lugar</label>
                <input type="text" id="lugar" name="lugar" th:placeholder="#{form.placeholder.location}" required>
            </div>
            <button type="submit" class="btn-submit" th:text="#{form.button.submit}">Crear Partida</button>
        </form>
    </div>
</body>

</html>
