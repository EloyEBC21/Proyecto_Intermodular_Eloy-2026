# --- Configuración de Internacionalización (i18n) ---
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0
spring.messages.fallback-to-system-locale=false

# --- Configuración de MySQL (Para Docker) ---
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin_app
spring.datasource.password=tu_password
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración de JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Ajustes para evitar que la conexión se cierre sola
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.idle-timeout=300000