# Configuración para usar la Base de Datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:game_and_grill_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Permite que Spring cree las tablas automáticamente basándose en tu Partida.java
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Activar la consola web de H2 para que puedas ver y meter datos desde el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console