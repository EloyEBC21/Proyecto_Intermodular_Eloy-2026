# --- Configuración de Internacionalización (i18n) ---
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0
spring.messages.fallback-to-system-locale=false

# --- Configuración de MySQL (Para Docker) ---
# 'db' es el nombre del servicio en tu archivo docker-compose.yml
# Cambia 'db' por 'localhost'
spring.datasource.url=jdbc:mysql://localhost:3306/tienda_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=admin_app
spring.datasource.password=tu_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración de JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect