# --- Configuración de MySQL ---
spring.datasource.url=jdbc:mysql://db:3306/tienda_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin_app
spring.datasource.password=tu_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hibernate/JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.defer-datasource-initialization=true
spring.datasource.continue-on-error=false

# --- Pool de Conexiones (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# --- Internacionalización ---
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.cache-duration=0

# Habilitar la inicialización con data.sql
spring.sql.init.mode=always
# Asegurarse de que no falle si la tabla ya tiene datos o algo no coincide
spring.sql.init.continue-on-error=true