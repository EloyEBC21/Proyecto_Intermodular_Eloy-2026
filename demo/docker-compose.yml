services:
  web:
    build: .
    container_name: mi-app-spring
    restart: always
    volumes:
      - ./src/main/resources/application.properties:/app/config/application.properties
    environment:
      - SPRING_CONFIG_LOCATION=file:/app/config/application.properties
      - SPRING_PROFILES_ACTIVE=prod
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: tienda_db
      MYSQL_ROOT_PASSWORD: tu_contraseña
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
